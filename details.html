<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;200;300;400;500;700&display=swap"
      rel="stylesheet">
    <script src="./js/data.js" defer></script>
    <script src="./js/details.js" defer></script>
    <title>Journey Album</title>
  </head>
  <body>
    <header class="detail-header">
      <div class="detail-header__inner">
        <a class="back" href="./trips.html"><i class="fa-solid fa-arrow-left"></i>一覧に戻る</a>
        <a class="detail-header__title info-title" href="#"></a>
      </div>
	  </header>
    <main class="detail">
      <!-- タブ -->
      <div class="detail-tabs">
        <ul class="tab-group" role="tablist">
          <li class="tab-group__item">
            <button class="detail-tab" role="tab" aria-controls="panel01" aria-selected="true">基本情報</button>
          </li>
          <li class="tab-group__item">
            <button class="detail-tab" role="tab" aria-controls="panel02" aria-selected="false">日程</button>
          </li>
          <li class="tab-group__item">
            <button class="detail-tab" role="tab" aria-controls="panel03" aria-selected="false">写真</button>
          </li>
          <li class="tab-group__item">
            <button class="detail-tab" role="tab" aria-controls="panel04" aria-selected="false">場所</button>
          </li>  
        </ul>  
      </div>
      
      <div class="detail-panel">
        
        <!-- 基本情報 -->
        <section class="detail-info panel__inner" id="panel01" role="tabpanel" aria-hidden="false">    
          <div class="detail-info__header">
            <img class="detail-hero__image" src="" alt="">
            <h1 class="info-title"></h1>
          </div>
          <div class="detail-info__content"></div>
        </section>
       
        <!-- 日程 -->
        <section class="schedule panel__inner" id="panel02" role="tabpanel" aria-hidden="true">
          <h2 class="schedule__title">旅行日程</h2>
           
          <div class="schedule__form">
            <input class="schedule-day-input" type="number" min="1" placeholder="⚪︎日目">
            <input class="schedule-time-input" type="time">
            <textarea class="schedule-memo-input" type="text" placeholder="メモ"></textarea>
            <button class="schedule-add-button" type="button">
              日程を追加
            </button>
            <div class="schedule__content"></div>
          </div>
        </section>
        
        <!--　写真 -->
        <section class="photos panel__inner" id="panel03" role="tabpanel" aria-hidden="true">
          <h2 class="photos__title">旅行写真</h2>
          <div class="photos__actions">
            <input class="photos__input" type="file" accept="image/*" multiple hidden>
            <button class="photos__add-button" type="button">
              写真を追加
            </button>
          </div>
          <div class="photos__gallery"></div>
        </section>
        
        <!-- 場所 -->
        <section class="places panel__inner" id="panel04" role="tabpanel" aria-hidden="true">
          <h2 class="places__title">行った場所</h2>
          <!-- 追加フォーム -->
          <form class="place-form">
            <input class="place-name-input" type="text" placeholder="場所名">
            <textarea class="place-memo-input" type="text" placeholder="メモ"></textarea>
            <select class="place-category-input">
              <option value="観光地"> 観光地 </option>
              <option value="グルメ"> グルメ </option>
              <option value="宿泊先"> 宿泊先 </option>
              <option value="映えスポット"> 映えスポット </option>
              <option value="アクティビティ">  アクティビティ </option>
              <option value="ショッピング">  ショッピング </option>
              <option value="休憩スポット">休憩スポット</option>
            </select>
            <button type="button" class="place-add-button">追加</button>
          </form>

          <!-- 表示エリア -->
          <div class="place-content"></div>
        </section>
      </div>
    </main>
  </body>
</html>
