<div class="login-modal__overlay"></div>
      
    <div class="login-modal__content" role="dialog" aria-modal="true">
        <button class="login-modal__close" type="button">×</button>
        <h2>ログイン / 新規登録</h2>
        <form class="login-form">
          <input class="email-input" type="email" placeholder="メールアドレス">
          <input class="password-input" type="password" placeholder="パスワード">
          <div class="register-btn">
            <button class="login-submit" type="submit">ログイン</button>
            <p>or</p>
            <button class="signup-submit"  type="submit">新規登録する</button>
          </div>  
        </form>
    </div>
